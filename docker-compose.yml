services:
  ollama:
    image: ollama/ollama
    container_name: agora-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  app:
    build: ./app
    container_name: agora-app
    volumes:
      - ./data:/data
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
