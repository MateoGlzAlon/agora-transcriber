services:
  ollama:
    image: ollama/ollama
    container_name: agora-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build: ./app
    container_name: agora-app
    volumes:
      - ./data:/data
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
